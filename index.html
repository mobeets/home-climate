<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Temperature & Humidity Data</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <h2>Temperature & Humidity Over Time</h2>
    <canvas id="dataChart" width="400" height="200"></canvas>
    
    <script>
        const sheetUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQS2FrpotQSiYeB3y1s2A7NfBh9h-19_QReOnXJ8P1uC0o3UZ3up-H8MmwfK98Pru-p-DTTtzTrIZH3/pub?gid=0&single=true&output=csv';

        async function fetchSheetData() {
            const response = await fetch(sheetUrl);
            const data = await response.text();
            return data.split('\n').map(row => row.split(',')); // Process CSV
        }

        function createChart(labels, tempData, humData) {
            const ctx = document.getElementById('dataChart').getContext('2d');
            new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [
                        {
                            label: 'Temperature',
                            data: tempData,
                            borderColor: 'rgb(255, 99, 132)',
                            fill: false,
                        },
                        {
                            label: 'Humidity',
                            data: humData,
                            borderColor: 'rgb(54, 162, 235)',
                            fill: false,
                        }
                    ]
                }
            });
        }

        fetchSheetData().then(data => {
            const labels = data.slice(1).map(row => row[0]); // Assuming first column is time
            const tempData = data.slice(1).map(row => parseFloat(row[1])); // Assuming second column is temperature
            const humData = data.slice(1).map(row => parseFloat(row[2])); // Assuming third column is humidity

            createChart(labels, tempData, humData);
        });
    </script>
</body>
</html>
